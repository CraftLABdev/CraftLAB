<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Isometric grass block -->

  <!-- Top face (grass - bright green) -->
  <polygon points="50,8 92,30 50,52 8,30" fill="#5DC95D"/>
  <!-- Top face texture squares -->
  <polygon points="50,8 92,30 50,52 8,30" fill="#4ade80" opacity="0.3"/>
  <rect x="36" y="18" width="6" height="5" rx="1" fill="#3dba3d" opacity="0.5" transform="skewX(-30) skewY(15)"/>
  <rect x="54" y="14" width="5" height="4" rx="1" fill="#3dba3d" opacity="0.5" transform="skewX(-30) skewY(15)"/>
  <rect x="62" y="26" width="4" height="4" rx="1" fill="#3dba3d" opacity="0.5" transform="skewX(-30) skewY(15)"/>
  <rect x="44" y="28" width="7" height="5" rx="1" fill="#3dba3d" opacity="0.5" transform="skewX(-30) skewY(15)"/>
  <rect x="28" y="28" width="5" height="4" rx="1" fill="#3dba3d" opacity="0.5" transform="skewX(-30) skewY(15)"/>

  <!-- Left face (dirt - brown) -->
  <polygon points="8,30 50,52 50,92 8,70" fill="#A0632A"/>
  <!-- Left face texture -->
  <rect x="14" y="55" width="8" height="7" rx="2" fill="#8B5523" opacity="0.8"/>
  <rect x="26" y="65" width="6" height="6" rx="2" fill="#8B5523" opacity="0.8"/>
  <rect x="16" y="72" width="7" height="6" rx="2" fill="#7a7a7a" opacity="0.5"/>
  <rect x="30" y="76" width="5" height="5" rx="2" fill="#8B5523" opacity="0.8"/>

  <!-- Right face (dirt - darker brown) -->
  <polygon points="50,52 92,30 92,70 50,92" fill="#8B5523"/>
  <!-- Right face texture -->
  <rect x="62" y="52" width="8" height="7" rx="2" fill="#7a4a1a" opacity="0.8"/>
  <rect x="74" y="46" width="6" height="6" rx="2" fill="#7a7a7a" opacity="0.5"/>
  <rect x="78" y="58" width="7" height="6" rx="2" fill="#7a4a1a" opacity="0.8"/>
  <rect x="64" y="66" width="6" height="6" rx="2" fill="#7a7a7a" opacity="0.5"/>
  <rect x="76" y="70" width="5" height="5" rx="2" fill="#7a4a1a" opacity="0.8"/>

  <!-- Grass overhang on left edge -->
  <polygon points="8,30 50,52 50,58 8,36" fill="#4ade80" opacity="0.7"/>
  <!-- Grass overhang on right edge -->
  <polygon points="50,52 92,30 92,36 50,58" fill="#3dba3d" opacity="0.7"/>

  <!-- Outlines -->
  <!-- Top face outline -->
  <polygon points="50,8 92,30 50,52 8,30" fill="none" stroke="#2d5016" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left face outline -->
  <polygon points="8,30 50,52 50,92 8,70" fill="none" stroke="#3d2000" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right face outline -->
  <polygon points="50,52 92,30 92,70 50,92" fill="none" stroke="#3d2000" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Center vertical line -->
  <line x1="50" y1="52" x2="50" y2="92" stroke="#3d2000" stroke-width="2.5"/>
</svg>
